networks:
  blog-dev-network:
    driver: bridge

services:
  frontend:
    build:
      context: .
      dockerfile: dockerfiles/frontend.dev.dockerfile
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    expose:
      - 5173
    networks:
      - blog-dev-network

  backend:
    build:
      context: .
      dockerfile: dockerfiles/backend.dockerfile
    volumes:
      - ./src/backend:/var/www/html
    expose:
      - 9000
    depends_on:
      - mysql
    networks:
      - blog-dev-network

  nginx:
    image: nginx:alpine
    ports:
      - 8000:80
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - blog-dev-network

  mysql:
    image: mysql:8.0
    env_file:
      - env/mysql.env
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - blog-dev-network

  phpmyadmin:
    image: phpmyadmin
    ports:
      - 1500:80
    env_file:
      - env/phpmyadmin.env
    depends_on:
      - mysql
    networks:
      - blog-dev-network

volumes:
  mysql_data: